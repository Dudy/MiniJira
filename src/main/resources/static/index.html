<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Jira Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <p>Mini Jira Clone</p>
    <nav class="main-nav" data-auth-required hidden aria-label="Hauptmenü">
        <button type="button" id="overviewButton" aria-current="page">Übersicht</button>
        <button type="button" id="dummyButton">Dummy</button>
        <button type="button" id="openCreateIssueButton">neues Issue</button>
    </nav>
    <div class="session-controls">
        <div id="sessionBox"></div>
        <div class="user-menu" id="userMenuWrapper" hidden>
            <button
                id="userMenuButton"
                class="user-menu-trigger"
                type="button"
                aria-haspopup="menu"
                aria-expanded="false"
                aria-controls="userMenu"
            ></button>
            <div id="userMenu" class="user-menu-popover" role="menu" hidden>
                <button type="button" class="user-menu-item" data-profile-button role="menuitem">Profil</button>
                <hr class="user-menu-separator">
                <button type="button" class="user-menu-item" data-logout-button role="menuitem">Logout</button>
            </div>
        </div>
    </div>
</header>

<main>
    <section class="panel auth-panel" id="authPanel">
        <div class="auth-header">
            <h2>User</h2>
            <div class="auth-toolbar">
                <div class="auth-switch" role="group" aria-label="Authentifizierung">
                    <button type="button" class="auth-tab" data-auth-target="login" aria-pressed="true">Login</button>
                    <button type="button" class="auth-tab" data-auth-target="register" aria-pressed="false">Register</button>
                </div>
            </div>
        </div>
        <form id="authForm" class="auth-form" autocomplete="on">
            <h3 id="authHeading">Login</h3>
            <label for="authUsername">Username</label>
            <input id="authUsername" name="username" autocomplete="section-auth username" required maxlength="80">
            <label for="authPassword">Passwort</label>
            <div class="password-field">
                <input id="authPassword" name="password" type="password" autocomplete="section-auth current-password" required maxlength="255">
                <button
                    type="button"
                    class="password-toggle"
                    data-password-toggle
                    data-password-input="authPassword"
                    title="Passwort anzeigen"
                    aria-label="Passwort anzeigen"
                    aria-pressed="false"
                ></button>
            </div>
            <button id="authSubmitButton" type="submit">Login</button>
        </form>
    </section>

    <section class="panel profile-panel" data-auth-required hidden id="profilePanel">
        <div class="toolbar">
            <h2>Profil</h2>
        </div>
        <form id="profileForm" class="profile-form">
            <label for="profileUserId">User ID</label>
            <input id="profileUserId" name="userId" readonly aria-readonly="true">

            <label for="profileUsername">Username</label>
            <input id="profileUsername" name="username" maxlength="80" required>

            <label for="profileDisplayName">Anzeigename</label>
            <input id="profileDisplayName" name="displayName" maxlength="120">

            <label for="profileOffice">Büro</label>
            <input id="profileOffice" name="office" maxlength="120">

            <div class="dialog-actions profile-actions">
                <button id="openPasswordDialogButton" type="button">Passwort ändern</button>
                <button id="profileCancelButton" type="button">Abbrechen</button>
                <button id="profileSaveButton" type="submit">Speichern</button>
            </div>
        </form>
    </section>

    <section class="panel" data-auth-required hidden id="overviewPanel">
        <div class="toolbar">
            <h2>Übersicht</h2>
            <button id="reloadIssuesButton" type="button">Neu laden</button>
        </div>
        <div class="filter-toolbar" aria-label="Filter">
            <div class="filter-control" data-filter-field="author">
                <button type="button" class="filter-button" data-filter-button aria-haspopup="true" aria-expanded="false" aria-controls="authorFilterMenu">
                    <span class="filter-label">Autor</span>
                    <span class="filter-summary" data-filter-summary>alle</span>
                </button>
                <div id="authorFilterMenu" class="filter-popover" data-filter-menu hidden></div>
            </div>
            <div class="filter-control" data-filter-field="worker">
                <button type="button" class="filter-button" data-filter-button aria-haspopup="true" aria-expanded="false" aria-controls="workerFilterMenu">
                    <span class="filter-label">Worker</span>
                    <span class="filter-summary" data-filter-summary>alle</span>
                </button>
                <div id="workerFilterMenu" class="filter-popover" data-filter-menu hidden></div>
            </div>
            <div class="filter-control" data-filter-field="status">
                <button type="button" class="filter-button" data-filter-button aria-haspopup="true" aria-expanded="false" aria-controls="statusFilterMenu">
                    <span class="filter-label">Status</span>
                    <span class="filter-summary" data-filter-summary>alle</span>
                </button>
                <div id="statusFilterMenu" class="filter-popover" data-filter-menu hidden></div>
            </div>
            <div class="filter-control" data-filter-field="priority">
                <button type="button" class="filter-button" data-filter-button aria-haspopup="true" aria-expanded="false" aria-controls="priorityFilterMenu">
                    <span class="filter-label">Priorität</span>
                    <span class="filter-summary" data-filter-summary>alle</span>
                </button>
                <div id="priorityFilterMenu" class="filter-popover" data-filter-menu hidden></div>
            </div>
        </div>
        <table>
            <thead>
            <tr>
                <th scope="col"><button type="button" class="sort-header" data-sort-field="id">ID <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button type="button" class="sort-header" data-sort-field="author">Autor <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button type="button" class="sort-header" data-sort-field="worker">Worker <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button type="button" class="sort-header" data-sort-field="title">Titel <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button type="button" class="sort-header" data-sort-field="status">Status <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button type="button" class="sort-header" data-sort-field="priority">Priorität <span class="sort-indicator" aria-hidden="true"></span></button></th>
            </tr>
            </thead>
            <tbody id="issueTableBody"></tbody>
        </table>
    </section>

    <section id="messageBox"></section>
</main>

<dialog id="issueDialog" class="issue-dialog">
    <section class="panel dialog-panel">
        <div class="dialog-header">
            <h2>Issue</h2>
            <button type="button" class="dialog-close" data-dialog-close aria-label="Dialog schließen">×</button>
        </div>
        <form id="issueForm" class="issue-form issue-form-dialog">
            <input name="id" type="hidden">
            <fieldset class="field-frame">
                <legend>Priorität</legend>
                <select name="priority" required aria-label="Priorität">
                    <option value="VERY_HIGH">Sehr hoch</option>
                    <option value="HIGH">Hoch</option>
                    <option value="MEDIUM" selected>Mittel</option>
                    <option value="LOW">Niedrig</option>
                    <option value="VERY_LOW">Sehr niedrig</option>
                </select>
            </fieldset>
            <fieldset class="field-frame">
                <legend>Status</legend>
                <select name="status" required aria-label="Status">
                    <option value="TODO" selected>to do</option>
                    <option value="DOING">doing</option>
                    <option value="TESTING">testing</option>
                    <option value="REVIEWING">reviewing</option>
                    <option value="DONE">done</option>
                </select>
            </fieldset>
            <fieldset class="field-frame">
                <legend>Titel</legend>
                <input name="title" required maxlength="200" placeholder="Kurz und präzise" aria-label="Titel">
            </fieldset>
            <fieldset class="field-frame field-frame-textarea">
                <legend>Beschreibung</legend>
                <textarea name="description" required maxlength="20000" placeholder="Was ist zu tun?" aria-label="Beschreibung"></textarea>
            </fieldset>
            <fieldset class="user-frame">
                <legend>Bearbeiter</legend>
                <div id="issueWorkerUsers" class="user-checkboxes"></div>
            </fieldset>
            <div class="dialog-actions">
                <button type="button" data-dialog-close>Abbrechen</button>
                <button type="submit">Speichern</button>
            </div>
        </form>
    </section>
</dialog>

<dialog id="passwordDialog" class="issue-dialog">
    <section class="panel dialog-panel">
        <div class="dialog-header">
            <h2>Passwort ändern</h2>
            <button type="button" class="dialog-close" data-dialog-close aria-label="Dialog schließen">×</button>
        </div>
        <form id="passwordForm" class="issue-form issue-form-dialog">
            <fieldset class="field-frame">
                <legend>Aktuelles Passwort</legend>
                <div class="password-field">
                    <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required maxlength="255">
                    <button
                        type="button"
                        class="password-toggle"
                        data-password-toggle
                        data-password-input="currentPassword"
                        title="Passwort anzeigen"
                        aria-label="Passwort anzeigen"
                        aria-pressed="false"
                    ></button>
                </div>
            </fieldset>
            <fieldset class="field-frame">
                <legend>Neues Passwort</legend>
                <div class="password-field">
                    <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required maxlength="255">
                    <button
                        type="button"
                        class="password-toggle"
                        data-password-toggle
                        data-password-input="newPassword"
                        title="Passwort anzeigen"
                        aria-label="Passwort anzeigen"
                        aria-pressed="false"
                    ></button>
                </div>
            </fieldset>
            <fieldset class="field-frame">
                <legend>Neues Passwort wiederholen</legend>
                <div class="password-field">
                    <input id="confirmNewPassword" name="confirmNewPassword" type="password" autocomplete="new-password" required maxlength="255">
                    <button
                        type="button"
                        class="password-toggle"
                        data-password-toggle
                        data-password-input="confirmNewPassword"
                        title="Passwort anzeigen"
                        aria-label="Passwort anzeigen"
                        aria-pressed="false"
                    ></button>
                </div>
            </fieldset>
            <div class="dialog-actions password-actions">
                <button type="button" data-dialog-close>Abbrechen</button>
                <button type="submit">Speichern</button>
            </div>
        </form>
    </section>
</dialog>

<footer>Plain HTML5 / ES6 / CSS3, served by Spring Boot static resources.</footer>
<script src="app.js" type="module"></script>
</body>
</html>
