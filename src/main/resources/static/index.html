<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Jira Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <p>Mini Jira Clone</p>
    <nav class="main-nav" data-auth-required hidden aria-label="Hauptmenü">
        <button type="button" id="overviewButton" aria-current="page">Übersicht</button>
        <button type="button" id="dummyButton">Dummy</button>
        <button type="button" id="openCreateIssueButton">neues Issue</button>
    </nav>
    <div class="session-controls">
        <div id="sessionBox"></div>
        <button id="logoutButton" type="button" hidden>Logout</button>
    </div>
</header>

<main>
    <section class="panel auth-panel" id="authPanel">
        <div class="auth-header">
            <h2>User</h2>
            <div class="auth-toolbar">
                <div class="auth-switch" role="group" aria-label="Authentifizierung">
                    <button type="button" class="auth-tab" data-auth-target="login" aria-pressed="true">Login</button>
                    <button type="button" class="auth-tab" data-auth-target="register" aria-pressed="false">Register</button>
                </div>
            </div>
        </div>
        <form id="loginForm" class="auth-form" data-auth-form="login" autocomplete="on">
            <h3>Login</h3>
            <label for="loginUsername">Username</label>
            <input id="loginUsername" name="username" autocomplete="section-login username" required maxlength="80">
            <label for="loginPassword">Passwort</label>
            <div class="password-field">
                <input id="loginPassword" name="password" type="password" autocomplete="section-login current-password" required maxlength="255">
                <button
                    type="button"
                    class="password-toggle"
                    data-password-toggle
                    data-password-input="loginPassword"
                    title="Passwort anzeigen"
                    aria-label="Passwort anzeigen"
                    aria-pressed="false"
                ></button>
            </div>
            <button>Login</button>
        </form>

        <form id="createUserForm" class="auth-form" data-auth-form="register" autocomplete="on" hidden>
            <h3>Register</h3>
            <label for="registerUsername">Username</label>
            <input id="registerUsername" name="username" autocomplete="section-register username" required maxlength="80">
            <label for="registerPassword">Passwort</label>
            <div class="password-field">
                <input id="registerPassword" name="password" type="password" autocomplete="section-register new-password" required maxlength="255">
                <button
                    type="button"
                    class="password-toggle"
                    data-password-toggle
                    data-password-input="registerPassword"
                    title="Passwort anzeigen"
                    aria-label="Passwort anzeigen"
                    aria-pressed="false"
                ></button>
            </div>
            <button>Registrieren</button>
        </form>
    </section>

    <section class="panel" data-auth-required hidden id="overviewPanel">
        <div class="toolbar">
            <h2>Übersicht</h2>
            <label>Sortierung
                <select id="sortSelect">
                    <option value="id">ID</option>
                    <option value="author">Autor</option>
                    <option value="priority">Priorität</option>
                </select>
            </label>
            <label>Richtung
                <select id="directionSelect">
                    <option value="asc">Aufsteigend</option>
                    <option value="desc">Absteigend</option>
                </select>
            </label>
            <button id="reloadIssuesButton">Neu laden</button>
        </div>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Autor</th>
                <th>Worker</th>
                <th>Titel</th>
                <th>Priorität</th>
            </tr>
            </thead>
            <tbody id="issueTableBody"></tbody>
        </table>
    </section>

    <section id="messageBox"></section>
</main>

<dialog id="createIssueDialog" class="issue-dialog">
    <section class="panel dialog-panel">
        <div class="dialog-header">
            <h2>Issue anlegen</h2>
            <button type="button" class="dialog-close" data-dialog-close aria-label="Dialog schließen">×</button>
        </div>
        <form id="createIssueForm" class="issue-form issue-form-dialog">
            <fieldset class="field-frame">
                <legend>Priorität</legend>
                <input id="createPriority" name="priority" type="number" min="1" max="5" value="3" required placeholder="3" aria-label="Priorität">
            </fieldset>
            <fieldset class="field-frame">
                <legend>Titel</legend>
                <input id="createTitle" name="title" required maxlength="200" placeholder="Kurz und präzise" aria-label="Titel">
            </fieldset>
            <fieldset class="field-frame field-frame-textarea">
                <legend>Beschreibung</legend>
                <textarea id="createDescription" name="description" required maxlength="20000" placeholder="Was ist zu tun?" aria-label="Beschreibung"></textarea>
            </fieldset>
            <fieldset class="user-frame">
                <legend>Bearbeiter</legend>
                <div id="createWorkerUsers" class="user-checkboxes"></div>
            </fieldset>
            <div class="dialog-actions">
                <button type="button" data-dialog-close>Abbrechen</button>
                <button>Issue anlegen</button>
            </div>
        </form>
    </section>
</dialog>

<dialog id="editIssueDialog" class="issue-dialog">
    <section class="panel dialog-panel">
        <div class="dialog-header">
            <h2>Issue bearbeiten</h2>
            <button type="button" class="dialog-close" data-dialog-close aria-label="Dialog schließen">×</button>
        </div>
        <form id="editIssueForm" class="issue-form issue-form-dialog">
            <input name="id" type="hidden">
            <fieldset class="field-frame">
                <legend>Titel</legend>
                <input name="title" required maxlength="200" placeholder="Kurz und präzise" aria-label="Titel">
            </fieldset>
            <fieldset class="field-frame field-frame-textarea">
                <legend>Beschreibung</legend>
                <textarea name="description" required maxlength="20000" placeholder="Was ist zu tun?" aria-label="Beschreibung"></textarea>
            </fieldset>
            <fieldset class="user-frame">
                <legend>Bearbeiter</legend>
                <div id="editWorkerUsers" class="user-checkboxes"></div>
            </fieldset>
            <div class="dialog-actions">
                <button type="button" data-dialog-close>Abbrechen</button>
                <button>Speichern</button>
            </div>
        </form>
    </section>
</dialog>

<footer>Plain HTML5 / ES6 / CSS3, served by Spring Boot static resources.</footer>
<script src="app.js" type="module"></script>
</body>
</html>
